<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUCY - Notifications</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#050505;
color:white;
}

.container{
max-width:900px;
margin:50px auto;
padding:20px;
}

.title{
color:#D4AF37;
font-size:32px;
margin-bottom:30px;
}


.notification{

background:#111;
border:1px solid #222;
border-left:4px solid #D4AF37;
padding:20px;
border-radius:12px;
margin-bottom:15px;
transition:.3s;

}


.notification:hover{

border-color:#D4AF37;
transform:translateX(5px);

}


.notification h3{

color:#D4AF37;
margin-bottom:8px;

}


.date{

font-size:13px;
color:#888;
margin-top:10px;

}


.empty{

background:#111;
padding:40px;
text-align:center;
border-radius:15px;
border:1px solid #D4AF37;
color:#aaa;

}


</style>

</head>


<body>


<div class="container">


<h1 class="title">
Notifications
</h1>


<div class="notification">

<h3>
Welcome to LUCY
</h3>

<p>
Your account has been created successfully.
</p>

<div class="date">
Today
</div>

</div>



<div class="notification">

<h3>
Security Reminder
</h3>

<p>
Keep your password private and enable extra security options.
</p>

<div class="date">
Today
</div>

</div>



<div class="notification">

<h3>
Account Updates
</h3>

<p>
Important platform announcements will appear here.
</p>

<div class="date">
Recent
</div>

</div>



</div>


</body>

</html>
