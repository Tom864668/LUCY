<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUCY Investment - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.container{
width:400px;
background:#111;
padding:40px;
border-radius:15px;
border:1px solid #D4AF37;
box-shadow:0 0 25px rgba(212,175,55,.2);
}

.logo{
text-align:center;
font-size:42px;
font-weight:700;
color:#D4AF37;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#bbb;
margin-bottom:30px;
}

input{
width:100%;
padding:14px;
margin-bottom:18px;
background:#1b1b1b;
border:1px solid #333;
border-radius:8px;
color:#fff;
outline:none;
}

input:focus{
border-color:#D4AF37;
}

button{
width:100%;
padding:15px;
background:#D4AF37;
color:#000;
font-weight:bold;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.02);
}

.extra{
margin-top:20px;
display:flex;
justify-content:space-between;
font-size:14px;
}

.extra a{
color:#D4AF37;
text-decoration:none;
}

.footer{
margin-top:25px;
text-align:center;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">LUCY</div>

<div class="subtitle">
Welcome back. Sign in to your account.
</div>

<form action="#" method="post">

<input
type="email"
placeholder="Email Address"
required>

<input
type="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="extra">

<a href="#">Forgot Password?</a>

<a href="register.html">Create Account</a>

</div>

<div class="footer">

© 2026 LUCY Investment

</div>

</div>

</body>
</html>
